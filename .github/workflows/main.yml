name: Docker Build, Push and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: pratapreddy007/ci-cd:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push      # runs only after build-and-push succeeds

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull pratapreddy007/ci-cd:latest
            docker stop ci-cd-container || true
            docker rm ci-cd-container || true
            docker run -d -p 8081:80 --name ci-cd-container pratapreddy007/ci-cd:latest
